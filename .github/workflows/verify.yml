name: Verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
      - name: Check JavaScript syntax
        run: |
          node --check app.js
          node --check server.mjs
          node --check api/audit.mjs
          node --check api/scan.mjs
          node --check lib/engine.mjs
          node --check lib/handler.mjs
